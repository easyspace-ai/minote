#   provider:
#     use: allowlist           # "allowlist", "oap", or "external"
#     config:
#       allowed_tools:
#         - web_search
#         - bash
#       denied_tools: []
#       # For OAP provider:
#       # passport: $OAP_PASSPORT
#       # For external provider:
#       # command: /usr/bin/guardrail-checker
#       # timeout_seconds: 10

# ============================================================================
# Tracing Configuration
# ============================================================================
# Enable observability tracing for LLM calls and tool executions.
tracing:
  enabled: false
  provider: langsmith         # "langsmith", "langfuse", "otlp", "console"
  # endpoint: ""              # Custom endpoint URL
  # api_key: $LANGSMITH_API_KEY

