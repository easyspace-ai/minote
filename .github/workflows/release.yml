name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          go-arch: ${{ matrix.goarch }}
          go-os: ${{ matrix.goos }}

      - name: Get dependencies
        run: go mod download

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUTPUT="deerflow-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi
          go build -ldflags="-s -w" -o "${OUTPUT}" ./cmd/langgraph
          echo "artifact=${OUTPUT}" >> $GITHUB_OUTPUT
          ls -lh "${OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deerflow-${{ matrix.goos }}-${{ matrix.goarch }}
          path: deerflow-${{ matrix.goos }}-${{ matrix.goarch }}
          compression: gzip

  docker:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    runs-on: ubuntu-latest
    needs: [release, docker]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # List artifacts
          ls -la artifacts/

          # Create release notes
          TAG_NAME="${TAG#v}"
          BODY="## deerflow-go ${TAG_NAME}

**下载说明**

| 平台 | 架构 | 文件 |
|------|------|------|
| Linux | amd64 | deerflow-linux-amd64 |
| Linux | arm64 | deerflow-linux-arm64 |
| macOS | arm64 | deerflow-darwin-arm64 |

**Docker**
\`\`\`bash
docker pull ghcr.io/${{ github.repository }}:${TAG}
\`\`\`

**快速启动（YOLO 模式）**
\`\`\`bash
# Linux amd64
chmod +x deerflow-linux-amd64
./deerflow-linux-amd64 --addr :8080

# 或使用 Docker
docker run -p 8080:8080 ghcr.io/${{ github.repository }}:${TAG}
\`\`\`

**环境变量**
| 变量 | 默认值 | 说明 |
|------|--------|------|
| DEFAULT_LLM_MODEL | qwen/Qwen3.5-9B | LLM 模型 |
| SILICONFLOW_API_KEY | - | SiliconFlow API Key（必需） |
| DEERFLOW_DATA_ROOT | /tmp/deerflow-go-data | 数据目录 |
| POSTGRES_URL | - | PostgreSQL 连接（可选） |
| LOG_LEVEL | info | 日志级别 |
"

          # Upload artifacts
          for f in artifacts/deerflow-*; do
            [ -f "$f" ] || continue
            echo "Uploading: $f"
          done

          # Use gh cli to create release
          gh release create "${TAG}" \
            --title "deerflow-go ${TAG_NAME}" \
            --notes "${BODY}" \
            --generate-notes \
            artifacts/deerflow-*/deerflow-* 2>/dev/null || \
          gh release create "${TAG}" \
            --title "deerflow-go ${TAG_NAME}" \
            --notes "${BODY}" \
            --generate-notes || true
