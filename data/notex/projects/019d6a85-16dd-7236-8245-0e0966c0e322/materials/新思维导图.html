# 新思维导图
- OpenClaw现状
  - 已经过时
  - 该路线已经开始落后
- 当前Agent行业认知
  - 普遍理解层面
    - 核心特点：会调工具、会自动执行
    - 发展现状：该方向即将被卷废淘汰
- 下一阶段Agent竞争核心
  - 比拼焦点：agent是否会学习、会记忆、能随任务一起成长
  - 价值方向：追求越用越强，而非仅追求demo效果
- Hermes Agent核心优势
  - 核心能力
    - 从经验中沉淀skill
    - 在使用过程中自我改进
    - 支持搜索过去的对话和任务
    - 逐渐建立对用户的理解
  - 跨平台持续工作
    - 支持Telegram
    - 支持Discord
    - 支持Slack
    - 支持CLI
  - 产品定位差异
    - 其他Agent：试图替用户执行任务
    - Hermes Agent：试图成为用户的长期数字分身
