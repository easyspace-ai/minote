# 新思维导图
- 3D思维模型构建
  - 形态特征：鲜活动态网络，区别于普通图表、思维导图，可展示思维真实形态
  - 实现方式：基于Obsidian保险库，将每一条笔记转换为嵌入物，实时渲染成3D思维网络
  - 发现感受：结果令人震惊
- 思维结构的三种类型
  - 中心化结构：所有思考围绕一两个主导思想展开
  - 去中心化结构：知识存储在很少相互交流的独立集群中
  - 分布式结构：想法在各个不同领域都紧密相连
- 大众认知与实际偏差
  - 普遍认知：大多数人认为自己的思维是分布式的
  - 实际情况：多数人一直都在独立知识体系中构建知识，自身毫无察觉
    - 从未意识到知识体系中存在的差距
    - 从未想到不同领域知识间可以建立全新连接
- 核心价值与意义
  - 最有趣之处：并非技术本身，而是首次看清自身真实想法的体验
  - 底层逻辑：人们无法改进自己看不见的事物
  - 突破：在此之前，没有人能够看到自身思维的真实结构
- Obsidian + AI 的全新定位
  - 不再仅仅是一款笔记应用
  - 新角色：一面映照个人智慧的镜子
</script>
