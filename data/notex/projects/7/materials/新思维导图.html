# 新思维导图
- Hermes Agent 基本概况
  - 开源背景：Nous Research 今年2月底开源
  - 社区热度：上线不到两个月GitHub星标接近三万
  - 行业定位：OpenClaw（龙虾）上线以来首个真正意义竞争对手
  - 与OpenClaw共同点：自托管开源智能体，MIT协议，支持多聊天平台接入，支持多模型切换
- 核心设计哲学差异
  - OpenClaw（龙虾）：网关定位
    - 核心是网关守护进程
    - 负责统一管理会话、路由和渠道连接
    - 定位为多渠道个人助理操作系统
  - Hermes Agent：引擎定位
    - 核心是agent自身执行循环
    - 围绕agent能力进化设计（闭环学习循环）
    - 聚焦：让agent变得越来越强
- 技能体系差异
  - Hermes Agent：自动化技能生成迭代
    - 完成复杂任务（≥5次工具调用）自动沉淀结构化Markdown技能文档
    - 使用过程中自我迭代，发现更好方法自动更新技能文档
    - 实际效果：重复性研究任务速度可提升40%
  - OpenClaw：人工社区贡献
    - 依赖人工编写，社区贡献的ClawHub技能市场
- 记忆体系差异
  - Hermes Agent：SQLite+全文检索双层记忆
    - 常驻记忆：关键信息写入MEMORY.md，每次对话携带
    - 全量记忆：无限容量全历史检索，按需调用
    - 类比：搜索引擎式大脑
  - OpenClaw：文件即记忆模式
    - 工作区Markdown文件存储，语义检索
    - 静默写入防止上下文压缩丢信息
    - 类比：笔记本式记忆
- 安全设计差异
  - Hermes Agent：五层纵深防御
    - 防护层：用户授权、危险命令审批、容器隔离、凭据过滤、上下文注入扫描
    - 默认策略：高风险操作需人工审批，超时自动拒绝
  - OpenClaw：信任模型+配置审计
    - 提供一键安全扫描命令，扫描配置隐患
    - 安全历史问题：今年2月多个高危漏洞，13.5万实例公网暴露，300+恶意技能
- 用户选择建议
  - 通用建议：原有Agent顺手无需更换，喜欢折腾可尝试体验
  - 适合OpenClaw场景：需要多渠道助理平台，依赖社区现成技能生态
    - 生态优势：34.6万星标，生态成熟
  - 适合Hermes Agent场景：关注agent长期进化能力，AI研究需要生成训练轨迹/强化学习实验
    - 附加特性：内建OpenAI API兼容服务端，可直接接入Open WebUI等第三方界面
  - 部署优势：5美元/月VPS即可运行，支持Docker/SSH/Modal等多种部署方式，一键curl命令安装
</script>
