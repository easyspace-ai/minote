# 新思维导图
- 十个认知真相
  - 第三个真相：别人的嘴管不了我的人生
    - 常见的他人评价：穿漂亮说炫耀，穿简单说寒酸，努力说功利，休息说懒惰
    - 真正的成熟：在喧嚣中守住自我
  - 第四个真相：放松就是力量
    - 高手成功逻辑：在放松中找回全部能量
    - 紧张时放松方法：深呼吸、放松肩膀手指、感受脚踏实地
  - 第五个真相：三种底层能力
    - 好好说话：懂分寸，对家人温和，对外人得体
    - 情绪稳定：做情绪的主人，不被情绪打败
    - 自我陪伴：学会和自己相处，内心安稳
  - 第六个真相：放手是高级慈悲
    - 过度操心就是温柔的绑架
    - 核心认知：每个人都有自己的因果和人生轨迹
    - 处事原则：自己的事尽力就好，别人的事尊重就行，老天的事接受便是
  - 第七个真相：孩子是最无条件爱你的人
    - 孩子对你的爱比你对孩子的爱更纯粹
    - 被责骂后依然不离不弃
    - 他们值得你的温柔和耐心
  - 第八个真相：知识是起点，智慧才是终点
    - 知识：书本上的定理公式
    - 智慧：用脚步走出来的体验
    - 真正的智慧来自现实的撞击和磨练
  - 第九个真相：混沌系统的真相
    - 算命是二级混沌系统，会影响你的行为
    - 真正决定命运的是你每天的选择
    - 理念：但行好事，莫问前程
  - 第十个真相：7个“不管怎样”
    - 不管怎样都要做自己
    - 不管怎样都要善良
    - 不管怎样都要成功
    - 不管怎样都要诚实
    - 不管怎样都要坚持
    - 不管怎样都要快乐
    - 不管怎样都要行善
- 核心总结
  - 人生底层逻辑：“善”和“真诚”
  - 基本信念：你对别人好，迟早会回到自己身上
