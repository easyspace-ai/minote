## 内容质量规范

### 题目设计原则
1. **清晰明确**：题干无歧义，选项互斥
2. **内容相关**：题目必须基于提供的材料
3. **难度递进**：从简单到复杂
4. **避免陷阱**：不设置易混淆的干扰项

### 答案解析要求
- 解释正确答案的原因
- 说明其他选项为什么不正确
- 关联到原文内容

### 互动功能
- 计时器显示
- 答题进度条
- 即时反馈（正确/错误）
- 答案解析展示
- 成绩统计与分享

### Step 5：质量评估（QA）

在返回结果前，执行自检：

**QA Checklist**:
- [ ] 题目数量 = 用户要求的数量（或根据内容合理推断）
- [ ] 每种题型至少 1 题（如果用户要求多种题型）
- [ ] 所有题目都有正确答案
- [ ] 所有题目都有答案解析
- [ ] 难度分布符合要求
- [ ] 无重复题目或相似度过高的题目
- [ ] 互动功能正常（计时器、提交按钮、成绩显示）

**评分标准**:
| 项目 | 权重 | 标准 |
|------|------|------|
| 题目质量 | 30% | 清晰、无歧义、有区分度 |
| 答案准确 | 25% | 正确答案无误、解析清晰 |
| 互动功能 | 20% | 按钮、计时器、评分正常 |
| 难度平衡 | 15% | 符合要求的难度分布 |
| 题型覆盖 | 10% | 要求的题型都有覆盖 |

