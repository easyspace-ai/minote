# =============================================================================
# YouMind 基础服务 Docker Compose 配置
#
# 架构说明:
#   - 此文件定义基础服务 (Postgres, Redis, MinIO, Milvus, markitdown, docreader)
#   - 本地开发: docker compose up -d (自动加载 override.yml 进行本地构建)
#   - 生产部署: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 使用方法:
#   1. cp .env.example .env (本地) 或 cp .env.server.example .env (服务器)
#   2. 编辑 .env，配置密码和镜像地址
#   3. make docker (本地) 或 make server-deploy (服务器)
#
# Mac 构建 -> 阿里云 ECS:
#   1. make acr-push-both ACR_VERSION=v1.0.0
#   2. 在服务器上配置 .env 中的镜像地址
#   3. make server-deploy
#
# 端口映射 (宿主机 -> 容器):
#   markitdown:  ${MARKITDOWN_PORT:-8787}:8787  (HTTP API)
#   postgres:    ${DB_HOST_PORT:-5432}:5432      (PostgreSQL)
#   redis:       ${REDIS_HOST_PORT:-6379}:6379   (Redis)
#   docreader:   ${DOCREADER_PORT:-50051}:50051 (gRPC)
#   minio:       ${MINIO_PORT:-9000}:9000 + ${MINIO_CONSOLE_PORT:-9001}:9001
#   milvus:      ${MILVUS_PORT:-19530}:19530 + ${MILVUS_HEALTH_PORT:-9091}:9091
#
# 云服务器架构: 固定 linux/amd64 (x86_64)，勿改 DOCKER_PLATFORM
# =============================================================================

name: youmind

services:
  markitdown:
    # 镜像: 本地开发使用 local tag，生产使用 ACR 镜像 (通过 docker-compose.prod.yml 覆盖)
    # 构建: 定义在 docker-compose.override.yml (本地开发) 或 acr-push.sh (Mac -> ACR)
    platform: linux/amd64
    image: ${MARKITDOWN_IMAGE:-youmind/markitdown-http:${MARKITDOWN_TAG:-local}}
    container_name: youmind-markitdown
    ports:
      - "${MARKITDOWN_PORT:-8787}:8787"
    environment:
      - MARKITDOWN_ENABLE_PLUGINS=${MARKITDOWN_ENABLE_PLUGINS:-false}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    networks:
      - youmind-network
    restart: unless-stopped

  postgres:
    image: paradedb/paradedb:v0.22.2-pg17
    container_name: youmind-postgres
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-youmind}
    volumes:
      - youmind-postgres-data:/var/lib/postgresql/data
    networks:
      - youmind-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 1m
    restart: unless-stopped

  redis:
    image: redis:7.0-alpine
    container_name: youmind-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-youmind-redis-local}
    volumes:
      - youmind-redis-data:/data
    networks:
      - youmind-network
    restart: unless-stopped

  docreader:
    # 镜像: 本地开发使用 local tag，生产使用 ACR 镜像 (通过 docker-compose.prod.yml 覆盖)
    # 构建: 定义在 docker-compose.override.yml (本地开发) 或 acr-push.sh (Mac -> ACR)
    platform: linux/amd64
    image: ${DOCREADER_IMAGE:-youmind/weknora-docreader:${WEKNORA_VERSION:-local}}
    container_name: youmind-docreader
    ports:
      - "${DOCREADER_PORT:-50051}:50051"
    volumes:
      - youmind-docreader-tmp:/tmp/docreader
    environment:
      DOCREADER_IMAGE_OUTPUT_DIR: /tmp/docreader
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
      MINERU_ENDPOINT: ${MINERU_ENDPOINT:-}
      # Object storage (same credentials as minio service; internal DNS for uploads from docreader)
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: http://127.0.0.1:${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY_ID:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_ACCESS_KEY:-minioadmin}
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - youmind-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: youmind-minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_ACCESS_KEY:-minioadmin}
    command: server --console-address ":9001" /data
    volumes:
      - youmind-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - youmind-network
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.6.11
    container_name: youmind-milvus
    security_opt:
      - seccomp:unconfined
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
      DEPLOY_MODE: STANDALONE
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_HEALTH_PORT:-9091}:9091"
    volumes:
      - youmind-milvus-data:/var/lib/milvus
    networks:
      - youmind-network
    restart: unless-stopped

networks:
  youmind-network:
    driver: bridge

volumes:
  youmind-postgres-data:
  youmind-redis-data:
  youmind-docreader-tmp:
  youmind-minio-data:
  youmind-milvus-data:
